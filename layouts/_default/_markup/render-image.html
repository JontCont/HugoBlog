{{- $src := .Destination -}}
{{- $isExternal := or (strings.HasPrefix $src "http://") (strings.HasPrefix $src "https://") -}}
{{- $isData := strings.HasPrefix $src "data:" -}}
{{- if and (not $isExternal) (not $isData) -}}
  {{- $src = (strings.TrimPrefix "/" $src) | relURL -}}
{{- end -}}
<img src="{{ $src | safeURL }}" alt="{{ .PlainText }}"{{ with .Title }} title="{{ . }}"{{ end }}>
