# ─── Theme Params ───────────────────────────────────────
[params]
  mainSections = ['posts']
  description  = '分享技術筆記與開發心得'
  rssFullContent = true

  [params.footer]
    since      = 2021
    customText = ''

  [params.dateFormat]
    published   = '2006-01-02'
    lastUpdated = '2006-01-02'

  [params.sidebar]
    compact = false
    emoji   = '💻'
    subtitle = '軟體工程師 / 技術筆記'
    avatar   = 'https://avatars.githubusercontent.com/u/52921053?v=4'

  [params.article]
    headingAnchor = true
    math          = false
    toc           = true
    readingTime   = true
    [params.article.list]
      showTags = true
    [params.article.license]
      enabled = false

  [params.widgets]
    [[params.widgets.homepage]]
      type = 'search'
    [[params.widgets.homepage]]
      type = 'archives'
    [[params.widgets.homepage]]
      type = 'tag-cloud'
    [[params.widgets.page]]
      type = 'toc'
    [[params.widgets.page]]
      type = 'tag-cloud'

  [params.colorScheme]
    toggle  = true
    default = 'auto'

  [params.imageProcessing]
    autoOrient = false
    [params.imageProcessing.external]
      timeout = '2s'
    [params.imageProcessing.content]
      enabled = true
    [params.imageProcessing.thumbnail]
      enabled = true

  [params.comments]
    enabled = false

  [params.opengraph.twitter]
    card = 'summary_large_image'
