  [languages.en.menus.main.params]
    icon = 'tag'

[[languages.en.menus.main]]
  name   = 'Categories'
  url    = '/categories/'
  weight = 4
  [languages.en.menus.main.params]
    icon = 'categories'

[[languages.en.menus.main]]
  name   = 'Gallery'
  url    = '/gallery/'
  weight = 5
  [languages.en.menus.main.params]
