baseURL = 'http://localhost:1313/'
title = 'JConte'
theme = 'hugo-theme-stack'
paginate = 12
hasCJKLanguage = true
defaultContentLanguage = 'zh-tw'

[languages.zh-tw]
  languageCode = 'zh-TW'
  languageName = '繁體中文'
  weight = 1

[languages.en]
  languageCode = 'en'
  languageName = 'English'
  weight = 2
  [languages.en.params]
    description = 'Tech notes & dev insights'
    [languages.en.params.sidebar]
      subtitle = 'Software Engineer / Tech Notes'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  lineNos = false

# ─── zh-tw Menu ────────────────────────────────────────
[[languages.zh-tw.menus.main]]
  name   = '首頁'
  url    = '/'
  weight = 1
  [languages.zh-tw.menus.main.params]
    icon = 'home'

[[languages.zh-tw.menus.main]]
  name   = '關於'
  url    = '/about/'
  weight = 2
  [languages.zh-tw.menus.main.params]
    icon = 'user'

[[languages.zh-tw.menus.main]]
  name   = '標籤'
  url    = '/tags/'
  weight = 3
  [languages.zh-tw.menus.main.params]
    icon = 'tag'

[[languages.zh-tw.menus.main]]
  name   = '分類'
  url    = '/categories/'
  weight = 4
  [languages.zh-tw.menus.main.params]
    icon = 'categories'

[[languages.zh-tw.menus.main]]
  name   = '圖片檔'
  url    = '/gallery/'
  weight = 5
  [languages.zh-tw.menus.main.params]
    icon = 'link'

[[languages.zh-tw.menus.main]]
  name   = '歸檔'
  url    = '/archives/'
  weight = 6
  [languages.zh-tw.menus.main.params]
    icon = 'archives'

# ─── English Menu ──────────────────────────────────────
[[languages.en.menus.main]]
  name   = 'Home'
  url    = '/'
  weight = 1
  [languages.en.menus.main.params]
    icon = 'home'

[[languages.en.menus.main]]
  name   = 'About'
  url    = '/about/'
  weight = 2
  [languages.en.menus.main.params]
    icon = 'user'

[[languages.en.menus.main]]
  name   = 'Tags'
  url    = '/tags/'
