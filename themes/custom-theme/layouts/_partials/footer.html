{{ $postCount := len (where site.RegularPages "Section" "posts") }}
<div class="footer-shell">
	<div>
		<p class="footer-shell__title">{{ site.Title }}</p>
		<p class="footer-shell__description">{{ T "footerDescription" (dict "Count" $postCount) }}</p>
	</div>
	<p class="footer-shell__copyright">{{ T "copyrightText" (dict "Year" now.Year) }}</p>
</div>
