{{ $subtitle := or site.Params.description "把技術筆記整理成更容易閱讀與搜尋的知識庫。" }}
<div class="header-shell card-surface" id="site-header">
  <div class="header-bar">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Title }}">
      <span class="brand__mark">H</span>
      <span class="brand__text">
        <strong>{{ site.Title }}</strong>
        <span>{{ $subtitle }}</span>
      </span>
    </a>
    <form class="site-search-form" action="/search/" method="get" role="search" aria-label="站內搜尋">
      <input type="search" name="q" placeholder="搜尋文章..." autocomplete="off" aria-label="搜尋關鍵字">
      <button type="submit">搜尋</button>
    </form>
  </div>
</div>
