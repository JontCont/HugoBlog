{{ define "main" }}
  <section class="search-page card-surface">
    <h1>{{ T "siteSearch" }}</h1>
    <p class="search-page__lead">{{ T "searchLead" }}</p>

    <form class="search-form" action="/search/" method="get">
      <input id="search-query-input" data-search-input name="q" type="search" placeholder="{{ T "searchExamplePlaceholder" }}" autocomplete="off">
      <button type="submit">{{ T "search" }}</button>
    </form>

    <section class="search-history" aria-label="{{ T "searchHistory" }}">
      <div class="search-history__head">
        <h2>{{ T "quickSearch" }}</h2>
        <button type="button" id="search-history-clear" class="search-history__clear">{{ T "clear" }}</button>
      </div>
      <div id="search-history-list" class="search-history__list"></div>
    </section>

    <p id="search-status" class="search-status">{{ T "searchPromptStart" }}</p>
    <div id="search-results" class="search-results"></div>
  </section>
{{ end }}
